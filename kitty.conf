shell /usr/bin/bash
shell_integration no-cursor

# Font
font_family      JetBrainsMono Nerd Font
font_size        11.0

# Transparency
background_opacity 0.8
blur_radius 8

# Cursor
cursor_shape block
cursor_blink_interval      0
cursor_trail               4
cursor_trail_decay         0.1 0.4
cursor_trail_start_threshold 3

# Window
window_padding_width       8
hide_window_decorations    yes

# Misc
enable_audio_bell          no
scrollback_lines           10000
copy_on_select             yes

# Themes
background            #202020
foreground            #d0d0d0
cursor                #d0d0d0
selection_background  #303030
color0                #151515
color8                #505050
color1                #ac4142
color9                #ac4142
color2                #7e8d50
color10               #7e8d50
color3                #e5b566
color11               #e5b566
color4                #6c99ba
color12               #6c99ba
color5                #9e4e85
color13               #9e4e85
color6                #7dd5cf
color14               #7dd5cf
color7                #d0d0d0
color15               #f5f5f5
selection_foreground #202020
