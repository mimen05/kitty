shell /usr/bin/zsh
shell_integration no-cursor

# Font
font_family      JetBrainsMono Nerd Font
font_size        11.0

# Transparency
background_opacity 0.8
blur_radius 8

# Cursor
cursor_shape block
cursor_blink_interval      0
cursor_trail               4
cursor_trail_decay         0.1 0.4
cursor_trail_start_threshold 3

# Theme
cursor            #c7c7c7
cursor_text_color #feffff
selection_foreground #3e3e3e
selection_background #c1ddff
foreground        #c8c8c8
background        #323232
color0            #252525
color8            #555555
color1            #be7472
color9            #ff9900
color2            #709772
color10           #97bb98
color3            #989772
color11           #fefdbc
color4            #7199bc
color12           #9fbdde
color5            #727399
color13           #989abc
color6            #719899
color14           #6fbbbc
color7            #7f7f7f
color15           #feffff

# Window
window_padding_width       8
hide_window_decorations    yes

# Misc
enable_audio_bell          no
scrollback_lines           10000
copy_on_select             yes
